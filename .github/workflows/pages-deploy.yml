name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'bench/results.csv'
      - 'bench/results_threaded.csv'
      - 'bench/ci_history.csv'
      - 'bench/plots/**'
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # dashboard/index.html fetches ../bench/*.csv and ../bench/plots/*.png via
      # relative paths, so the published tree has to keep dashboard/ and bench/
      # side by side in that same relative layout — publishing dashboard/ alone
      # would leave every chart in a permanent empty-state.
      - name: Stage site
        run: |
          mkdir -p _site/bench/plots
          cp -r dashboard/. _site/dashboard/
          cp bench/results.csv bench/results_threaded.csv bench/ci_history.csv _site/bench/
          cp bench/plots/*.png _site/bench/plots/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
