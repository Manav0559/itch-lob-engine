name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Linux in the matrix is non-negotiable: case-sensitive includes and
      # glibc differences are exactly the class of bug macOS-only dev hides.
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    # Needed only for the "Commit updated ci_history.csv" step below, which
    # pushes bench/ci_history.csv back to main after a successful push-to-main
    # build. Scoped to this job (not the workflow) so sanitize/fuzz-smoke never
    # get a write-capable token they have no use for. On pull_request runs --
    # including PRs from forks -- GitHub always forces GITHUB_TOKEN to
    # read-only regardless of this block, so this is a no-op except on push.
    permissions:
      contents: write

    steps:
      # fetch-depth: 0 (full history, not the default shallow depth-1 clone)
      # so the "Commit updated ci_history.csv" step's `git pull --rebase` can
      # actually rebase against origin/main instead of choking on missing
      # history when the other matrix leg has pushed a commit in the
      # meantime.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Every other build in this file (this job's Release, sanitize's
      # RelWithDebInfo) sets NDEBUG by CMake convention, which compiles
      # every assert() in the codebase to a no-op — an entire class of
      # precondition-contract regression (see exec/twap.hpp and friends,
      # which had exactly this gap until it was found and fixed) would
      # otherwise be invisible to every job at once. This Debug build
      # exists solely so assert() means something somewhere in the matrix.
      - name: Configure (Debug, asserts enabled)
        run: cmake -B build-debug -DCMAKE_BUILD_TYPE=Debug

      # All targets, not just unit_tests: ctest's replay_selftest case execs
      # the real `replay` binary (see CMakeLists.txt's add_test), so it has
      # to exist in this build directory too, not just build/'s Release one.
      - name: Build (Debug)
        run: cmake --build build-debug --parallel

      - name: Test (Debug, asserts enabled)
        run: ctest --test-dir build-debug --output-on-failure

      - name: Build bench
        run: cmake --build build --parallel --target bench

      - name: Run benchmark and check performance budget
        # Hard-fails only if LadderBook's measured advantage over OrderBook
        # regresses past bench/check_budget.py's ratio threshold — see
        # bench/BUDGET.md for why this is a same-run ratio check, not an
        # absolute-nanosecond one (CI runners are noisy/shared machines).
        #
        # Even a same-run ratio isn't fully noise-proof on a single pass:
        # message type 'D' has always had the narrowest margin of any type
        # (79.9% of the 90% threshold even in the very first committed
        # numbers), so a shared/loaded CI runner can occasionally push a
        # single ./build/bench invocation's ratio over the line without any
        # real regression. This applies the same "a process can only get
        # slower from outside interference, never faster, so the best of a
        # few passes recovers the true noise-robust estimate" reasoning
        # bench/bench_threaded_main.cpp already uses for its own pass timing
        # (see its run_path()) — up to 3 fresh ./build/bench runs, succeeding
        # on the first that clears the budget, rather than loosening the
        # threshold to paper over noise on one run.
        #
        # Drift warnings (informational, never fail the build) need
        # bench/ci_history.csv to accumulate real numbers over time. That
        # history is recorded and committed back to main automatically by the
        # two steps below (repo Actions "Workflow permissions" is now "Read
        # and write", so this no longer needs a human to run
        # `python3 bench/check_budget.py record` by hand — see
        # bench/CI_INTEGRATION.md).
        run: |
          for attempt in 1 2 3; do
            echo "=== bench + budget check, attempt $attempt/3 ==="
            ./build/bench
            if python3 bench/check_budget.py check; then
              exit 0
            fi
            echo "attempt $attempt failed the ratio budget; retrying if attempts remain"
          done
          echo "all 3 attempts failed the ratio budget — this is a real regression, not noise"
          exit 1

      # Only runs after a *successful* benchmark + budget-check run (the step
      # above must have exited 0 for this one to execute at all), and only for
      # a push that landed on main -- never for pull_request events, so a PR
      # from a fork (or from a branch) can't get history recorded for
      # numbers that never merged, and never gets a write-capable token in
      # the first place (GitHub forces GITHUB_TOKEN read-only on pull_request
      # runs regardless of the `permissions` block above).
      - name: Record benchmark history
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: python3 bench/check_budget.py record

      # Commits bench/ci_history.csv back to main using the default
      # GITHUB_TOKEN (see the job-level `permissions: contents: write` above).
      # Only commits if `record` actually changed the file -- re-running for a
      # commit/os pair already present in history is a no-op (see
      # check_budget.py's `record` idempotency), so `git diff --staged --quiet`
      # guards against empty commits. Both matrix legs (ubuntu-latest,
      # macos-latest) append different rows for the same commit and race to
      # push; the retry loop re-pulls and rebases before each attempt so the
      # second job's push doesn't get rejected as non-fast-forward.
      - name: Commit updated ci_history.csv
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bench/ci_history.csv
          if git diff --staged --quiet; then
            echo "bench/ci_history.csv unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "bench: record CI history for ${GITHUB_SHA::12} (${{ matrix.os }})"
          # The benchmark steps above regenerate bench/results.csv and
          # bench/results_threaded.csv in place -- both are tracked files
          # (see bench/README.md), so by this point they're unstaged
          # modifications in the working tree. `git pull --rebase` refuses
          # to run with any unstaged changes present, tracked-but-unrelated
          # or not, so it failed unconditionally on every push until this
          # fix -- restore them to what's already committed (ci_history.csv
          # is the only file this step ever intends to commit; the run's
          # freshly generated numbers were never meant to be, and rerunning
          # bench/bench_threaded regenerates them again next time anyway).
          git checkout -- bench/results.csv bench/results_threaded.csv
          for i in 1 2 3; do
            # A conflicting rebase (both matrix legs racing to append their
            # own row to this same file) leaves the working tree mid-rebase
            # with unmerged files -- every subsequent `git pull --rebase` in
            # this loop then fails immediately with "Pulling is not possible
            # because you have unmerged files," never actually retrying
            # against the now-current origin/main. Abort any such leftover
            # state before each attempt so a real conflict gets a genuine
            # retry, not three fast, identical failures.
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $i failed (likely racing the other matrix leg); retrying"
            sleep $((RANDOM % 5 + 1))
          done
          git rebase --abort 2>/dev/null || true
          echo "failed to push bench/ci_history.csv after 3 attempts"
          exit 1

      # Linux-only: pipeline::pin_this_thread_to_core is a REAL hard pin here
      # (pthread_setaffinity_np), unlike macOS's best-effort scheduling hint
      # (see pipeline/thread_affinity.hpp) — this is the platform that can
      # actually answer "does core pinning change the threaded-pipeline
      # verdict," which local macOS runs (see bench/THREADED_PIPELINE_FINDINGS.md)
      # could only ever answer with a hint, not a real pin. Informational
      # only: a hosted CI runner's vCPUs are themselves shared/virtualized, so
      # even a real pin here is one more noisy data point, not a verdict to
      # gate the build on — printed to the log for a human to read across
      # runs over time, same spirit as the budget check's drift warning.
      - name: Build bench_threaded
        if: matrix.os == 'ubuntu-latest'
        run: cmake --build build --parallel --target bench_threaded

      - name: Run threaded-pipeline benchmark (pinned vs. unpinned, informational)
        if: matrix.os == 'ubuntu-latest'
        run: ./build/bench_threaded

  sanitize:
    name: sanitize (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address-undefined, thread]
    steps:
      - uses: actions/checkout@v4

      # A separate build directory per sanitizer, configured entirely through
      # CMAKE_CXX_FLAGS/CMAKE_EXE_LINKER_FLAGS — CMakeLists.txt itself needs
      # no sanitizer-specific logic, so the normal -Wall -Wextra -Wpedantic
      # -Werror build stays exactly as clean as it is today.
      - name: Configure (ASan + UBSan)
        if: matrix.sanitizer == 'address-undefined'
        run: |
          cmake -B build-san -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Configure (TSan)
        if: matrix.sanitizer == 'thread'
        run: |
          cmake -B build-san -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      # ASan+UBSan's ctest run below includes replay_selftest, which execs the
      # real `replay` binary — so that job needs everything built, not just
      # unit_tests. TSan only ever runs unit_tests directly (see below), so
      # it skips instrumenting+linking the other binaries it'll never invoke.
      - name: Build (all targets)
        if: matrix.sanitizer == 'address-undefined'
        run: cmake --build build-san --parallel

      - name: Build unit_tests
        if: matrix.sanitizer == 'thread'
        run: cmake --build build-san --parallel --target unit_tests

      # ASan+UBSan runs the WHOLE suite: memory errors and undefined behavior
      # can hide in any code path (parser, book, exec, io), not just the
      # concurrent ones, so there's no principled subset to skip here.
      - name: Run full suite under ASan + UBSan
        if: matrix.sanitizer == 'address-undefined'
        run: ctest --test-dir build-san --output-on-failure

      # TSan only checks concurrent code, and is expensive per-test — running
      # it against ~90 single-threaded test cases that touch no shared state
      # across threads would burn CI time without ever exercising what TSan
      # exists to catch. Scoped to the [concurrency] tag: the SPSC queue's
      # real cross-thread producer/consumer test, both threaded-pipeline
      # correctness checks (test_replay_threaded.cpp, one instantiation per
      # book type), and the multicast receiver's background-sender-thread
      # test — every test in this codebase that actually spawns a second
      # thread and shares state with it. This is exactly what closes the gap
      # this project's own spsc_queue test comment named as the missing
      # piece: acquire/release ordering reasoned about in comments, now
      # actually checked by the tool built for it, not just argued in prose.
      - name: Run [concurrency]-tagged tests under TSan
        if: matrix.sanitizer == 'thread'
        run: ./build-san/unit_tests "[concurrency]"

  coverage:
    name: coverage (gcc + lcov)
    runs-on: ubuntu-latest

    # Same scoping reasoning as build-test's job-level `permissions` above:
    # only this job's own "Commit updated coverage badge" step (push-to-main
    # only) ever uses write access; sanitize/fuzz-smoke get none.
    permissions:
      contents: write

    steps:
      # fetch-depth: 0 for the same reason as build-test's checkout: the
      # "Commit updated coverage badge" step's `git pull --rebase` needs
      # real history to rebase against, not a shallow depth-1 clone.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      # --coverage is GCC's (and Clang's, but this job deliberately uses
      # ubuntu-latest's default g++ toolchain, not clang++, since gcov/lcov
      # is the combination lcov is built around) flag for
      # -fprofile-arcs -ftest-coverage at compile time and linking in
      # libgcov -- a separate build tree from build/build-debug/build-san,
      # since instrumented codegen has no business leaking into any of
      # those. -O0 keeps line hit-counts attributable to source lines
      # instead of blurred by inlining/reordering.
      - name: Configure (coverage instrumentation)
        run: |
          cmake -B build-coverage -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -O0" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      # All targets, not just unit_tests: ctest's replay_selftest case execs
      # the real `replay` binary (see CMakeLists.txt), and build-test's
      # build-debug job already sets the precedent that binary needs to
      # exist in every build directory ctest runs against, not just build/.
      - name: Build (all targets)
        run: cmake --build build-coverage --parallel

      # Running the suite is what produces the .gcda files lcov captures
      # below -- coverage data only exists for code paths this run actually
      # exercised.
      - name: Test (collect coverage)
        run: ctest --test-dir build-coverage --output-on-failure

      # Capture, then filter out everything that isn't this project's own
      # code: system headers, the FetchContent-vendored Catch2 tree
      # (_deps/), and the test files themselves -- coverage of test code
      # isn't the question being answered here, coverage of include/ + src/
      # by the tests is.
      # --ignore-errors mismatch,source: two distinct, known geninfo quirks
      # against the vendored Catch2 build tree, neither a real coverage-data
      # problem -- geninfo's own error text names both flags as the way past
      # them:
      #   mismatch: gcov's intermediate format occasionally disagrees with
      #     itself on exception-tag ids for STL header code instantiated
      #     across multiple translation units (seen on
      #     /usr/include/c++/13/bits/stl_algo.h and friends).
      #   source: geninfo resolving a .gcno-embedded relative path against
      #     the wrong base directory for a FetchContent-vendored dependency
      #     (seen as "unable to open .../catch2-build/src/src/catch2/..." --
      #     that doubled src/src is the symptom, not a file that's actually
      #     missing from the build).
      - name: Capture coverage with lcov
        run: |
          lcov --capture --directory build-coverage \
            --output-file coverage/lcov.info --rc branch_coverage=1 \
            --ignore-errors mismatch,source
          lcov --remove coverage/lcov.info \
            '/usr/*' '*/_deps/*' '*/tests/*' \
            --output-file coverage/lcov.filtered.info \
            --rc branch_coverage=1
          lcov --list coverage/lcov.filtered.info --rc branch_coverage=1

      # Prints a line/branch coverage table straight to the Actions run's
      # job summary (visible without opening the README) and writes
      # coverage/coverage.json, the badge source the next step commits.
      - name: Compute coverage % and write job summary
        run: |
          python3 coverage/make_badge.py coverage/lcov.filtered.info \
            >> "$GITHUB_STEP_SUMMARY"

      # Push-to-main only, same reasoning as "Commit updated ci_history.csv"
      # in build-test: a PR from an unmerged (or since-abandoned) branch
      # shouldn't get to overwrite the badge everyone else sees, and
      # GITHUB_TOKEN is forced read-only on pull_request runs regardless.
      - name: Commit updated coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage/coverage.json
          if git diff --staged --quiet; then
            echo "coverage/coverage.json unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "coverage: update badge for ${GITHUB_SHA::12}"
          for i in 1 2 3; do
            # See the identical comment on "Commit updated ci_history.csv"'s
            # retry loop: a failed rebase leaves unmerged files behind, which
            # makes every later attempt in this loop fail immediately without
            # actually retrying, unless that state is cleared first.
            git rebase --abort 2>/dev/null || true
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $i failed (likely racing another job's push); retrying"
            sleep $((RANDOM % 5 + 1))
          done
          git rebase --abort 2>/dev/null || true
          echo "failed to push coverage/coverage.json after 3 attempts"
          exit 1

  fuzz-smoke:
    name: fuzz smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bounded (60s) libFuzzer run against the ITCH parser through a real
      # BookBuilder, on every push/PR — turning "we have a fuzzer" (previously
      # true only if a human remembered to run fuzz/build_and_run.sh locally)
      # into "our fuzzer runs continuously." A crash found here is a real bug,
      # not noise the way a perf-ratio blip is — so unlike the benchmark
      # budget above, this is a hard, unconditional fail with no retry.
      # Linux-only: the system clang++ on ubuntu-latest already bundles
      # libclang_rt.fuzzer, no extra toolchain setup needed (see
      # fuzz/build_and_run.sh's macOS-only Homebrew-LLVM fallback, which
      # this CI job doesn't need).
      - name: Fuzz ITCH parser for 60s
        run: fuzz/build_and_run.sh 60
